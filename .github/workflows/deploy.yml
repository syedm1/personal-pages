name: Deploy Trip Calendar to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        env:
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          SHA_PASSWORD: ${{ secrets.SHA_PASSWORD }}
          NIKKI_PASSWORD: ${{ secrets.NIKKI_PASSWORD }}
        run: |
          mkdir -p dist
          python3 << 'PYEOF'
          import os
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          content = content.replace('__JSONBIN_KEY__', os.environ['JSONBIN_KEY'])
          content = content.replace('__SHA_PASSWORD__', os.environ['SHA_PASSWORD'])
          content = content.replace('__NIKKI_PASSWORD__', os.environ['NIKKI_PASSWORD'])
          with open('dist/index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          print('Secrets injected successfully')
          PYEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

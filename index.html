<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sha + Nikki — India Trip 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<style>
:root {
  --color-text-primary: #111827;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #9ca3af;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f3f4f6;
  --color-background-tertiary: #e9eaec;
  --color-border-tertiary: #e2e8f0;
  --font-sans: 'Inter', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #E2E5EC; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  color: #111827;
  padding: 28px 16px 48px;
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.4;
}
.page-wrap {
  background: #fff;
  max-width: 820px;
  margin: 0 auto;
  border-radius: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.07), 0 16px 48px rgba(0,0,0,0.09);
  padding: 28px 34px 36px;
  border-top: 4px solid #534AB7;
}
#print-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #111827;
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 6px 14px;
  font-size: 11.5px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 22px;
  letter-spacing: 0.01em;
  opacity: 0.75;
  transition: opacity 0.15s;
}
#print-btn:hover { opacity: 1; }
.sec-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  margin-bottom: 7px;
}
@media (max-width: 640px) {
  body { padding: 0; }
  .page-wrap { border-radius: 0; padding: 14px 12px 28px; min-height: 100vh; }
  .cards-row { grid-template-columns: 1fr !important; }
  #booking-grid { grid-template-columns: 1fr !important; }
}
@media print {
  html { background: white; }
  .page-wrap {
    box-shadow: none;
    border-radius: 0;
    max-width: 100%;
    padding: 0;
    border-top: 3px solid #534AB7;
  }
  body { padding: 0; font-size: 11.5px; }
  #print-btn, #chat-btn, #chat-panel { display: none !important; }
  .cal-week { break-inside: avoid; page-break-inside: avoid; }
  .cards-row { break-inside: avoid; page-break-inside: avoid; }
  *, *::before, *::after {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  @page { size: A4 portrait; margin: 12mm 14mm; }
}
</style>
</head>
<body>
<div id="chat-btn" onclick="toggleChat()" title="Trip Assistant" style="position:fixed;bottom:24px;right:24px;width:54px;height:54px;background:#534AB7;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px rgba(83,74,183,0.45);z-index:7000;font-size:22px;transition:transform 0.15s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">&#x2708;&#xFE0F;</div>
<div id="chat-panel" style="position:fixed;bottom:90px;right:24px;width:330px;height:510px;background:#fff;border-radius:16px;box-shadow:0 8px 36px rgba(0,0,0,0.18);display:none;flex-direction:column;z-index:7000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;">
  <div style="background:linear-gradient(135deg,#534AB7,#6C5CE7);padding:12px 14px 8px;flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <p style="font-size:13px;font-weight:600;color:#fff;margin:0;">&#x2708;&#xFE0F; Trip Assistant</p>
      <div style="display:flex;gap:6px;align-items:center;">
        <button onclick="clearChat()" title="New chat" style="background:rgba(255,255,255,0.15);border:none;border-radius:5px;padding:3px 8px;font-size:11px;color:rgba(255,255,255,0.85);cursor:pointer;font-family:inherit;">&#x1F5D1; New</button>
        <button onclick="toggleChat()" style="background:none;border:none;color:rgba(255,255,255,0.8);font-size:22px;cursor:pointer;padding:0;line-height:1;">&times;</button>
      </div>
    </div>
    <div style="display:flex;gap:4px;">
      <button id="tab-chat" onclick="showTab('chat')" style="flex:1;background:rgba(255,255,255,0.25);border:none;border-radius:6px;padding:5px;font-size:11px;color:#fff;cursor:pointer;font-family:inherit;font-weight:500;">&#x1F4AC; Chat</button>
      <button id="tab-ctx" onclick="showTab('ctx')" style="flex:1;background:rgba(255,255,255,0.1);border:none;border-radius:6px;padding:5px;font-size:11px;color:rgba(255,255,255,0.65);cursor:pointer;font-family:inherit;">&#x1F4CB; Context</button>
    </div>
  </div>
  <div id="view-chat" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;"></div>
    <div style="padding:10px 12px;border-top:1px solid #e2e8f0;display:flex;gap:6px;flex-shrink:0;">
      <input id="chat-input" type="text" placeholder="Ask about your trip..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;outline:none;color:#111827;">
      <button onclick="sendChat()" style="background:#534AB7;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;">&#x2192;</button>
    </div>
  </div>
  <div id="view-ctx" style="flex:1;display:none;flex-direction:column;overflow:hidden;padding:10px 12px 8px;">
    <p style="font-size:10px;color:#9ca3af;margin:0 0 6px;">Shared notes for Mango — editable by Sha &amp; Nikki. Auto-saved &amp; included in every response.</p>
    <textarea id="ctx-input" oninput="saveContext()" placeholder="Packing list, hotel bookings, visa status, important numbers, reminders..." style="flex:1;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;resize:none;outline:none;color:#111827;line-height:1.6;"></textarea>
    <p id="ctx-status" style="font-size:10px;color:#9ca3af;margin:5px 0 0;"></p>
  </div>
</div>
<div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:8888;padding:16px;font-family:'Inter',system-ui,sans-serif;">
  <div style="background:#fff;border-radius:14px;padding:22px;max-width:400px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 id="modal-date" style="font-size:14px;font-weight:600;color:#111827;"></h3>
      <button onclick="closeDayModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;line-height:1;padding:0 4px;">&times;</button>
    </div>
    <div id="modal-notes" style="margin-bottom:12px;"></div>
    <input type="hidden" id="modal-key">
    <textarea id="modal-input" placeholder="Add a note..." style="width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:70px;outline:none;margin-bottom:8px;color:#111827;"></textarea>
    <button id="modal-add-btn" onclick="addDayNote()" style="width:100%;background:#534AB7;color:#fff;border:none;border-radius:8px;padding:9px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;">Add note</button>
  </div>
</div>
<div id="pw-gate" style="position:fixed;inset:0;background:#E2E5EC;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;font-family:'Inter',system-ui,sans-serif;">
  <div style="background:#fff;border-radius:16px;padding:36px 28px 28px;max-width:320px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15);border-top:4px solid #534AB7;">
    <div style="font-size:28px;margin-bottom:12px;">✈️</div>
    <h2 style="font-size:16px;font-weight:600;color:#111827;margin-bottom:5px;">Sha + Nikki · Trip 2026</h2>
    <p style="font-size:12px;color:#6b7280;margin-bottom:20px;">Enter password to view the itinerary</p>
    <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password"
      style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;color:#111827;">
    <p id="pw-error" style="font-size:11px;color:#dc2626;margin-bottom:10px;min-height:16px;"></p>
    <button onclick="checkPw()" style="width:100%;background:#534AB7;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;">Open itinerary →</button>
  </div>
</div>
<div class="page-wrap">
<button id="print-btn" onclick="window.print()">Print / Save as PDF</button>
<div id="root"></div>
</div>
<script>
let currentUser=sessionStorage.getItem('tripUser')||null;
(function(){
  if(sessionStorage.getItem('travelauth')==='1'){
    document.getElementById('pw-gate').style.display='none';
    document.getElementById('chat-btn').style.display='flex';
  }
  document.getElementById('pw-input').addEventListener('keydown',function(e){
    if(e.key==='Enter') checkPw();
  });
})();
function checkPw(){
  const v=document.getElementById('pw-input').value.trim();
  if(v==='__SHA_PASSWORD__'||v==='__NIKKI_PASSWORD__'){
    currentUser=v==='__SHA_PASSWORD__'?'Sha':'Nikki';
    sessionStorage.setItem('travelauth','1');
    sessionStorage.setItem('tripUser',currentUser);
    document.getElementById('pw-gate').style.display='none';
    document.getElementById('chat-btn').style.display='flex';
    loadData();
  } else {
    document.getElementById('pw-error').textContent='Incorrect password, try again.';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

// ── Chat assistant ──
const _OKEY_B64='__LLM_KEY__';const _OKEY=_OKEY_B64.startsWith('__')?'':atob(_OKEY_B64);
const _SYSPROMPT=`You are Mango, a friendly AI travel assistant built specifically for Sha and Nikki's India & Bangkok trip in 2026. Be warm, concise, and practical. Use bullet points for lists.

THEIR ITINERARY:
- May 4-5: Both in Melbourne
- May 6-7: Sha travels Melbourne → Nellore, India
- May 8-28: Sha in Nellore (family time). Nikki in Melbourne until May 15.
- May 15: Nikki flies Melbourne → Delhi (still to book, ±1-2 days flex)
- May 29 - Jun 3: Both together in Delhi. Family event Sat May 30.
- Jun 4: Both travel Delhi → Nellore together (to book, ±1 day)
- Jun 5-9: Both in Nellore together
- Jun 10: Drive Nellore → Chennai (~3 hrs). Night flight.
- Jun 10 23:40: AirAsia FD154 Chennai → Bangkok (confirmed)
- Jun 11-13: Both in Bangkok
- Jun 14 21:40: Jetstar JQ30 Bangkok → Melbourne (confirmed)
- Jun 16: Arrive Melbourne

FLIGHTS STILL TO BOOK:
- Nikki: Melb → Delhi ~May 15 (±1-2 days)
- Sha: Melb → Nellore ~May 6-7 (±1-2 days)
- Both: Delhi → Nellore Jun 4 (±1 day)

You help with: flight search tips, hotel picks, things to do in Delhi/Nellore/Chennai/Bangkok, packing lists, budget, local transport, food, weather, visa info, currency tips. Keep responses short and friendly. Address them by name when relevant.`;

let _chatMessages=[];
let _chatOpen=false;
let _chatBinId=null;
let _contextBinId=localStorage.getItem('tripContextBinId')||null;
let sharedContext='';

async function _ensureChatBin(){
  if(_chatBinId)return;
  const lk='tripChatBin_'+(currentUser||'guest').toLowerCase();
  _chatBinId=localStorage.getItem(lk)||null;
  if(_chatBinId)return;
  try{
    const r=await fetch(_BINAPI,{method:'POST',headers:{'Content-Type':'application/json','X-Access-Key':_APIKEY,'X-Bin-Name':'trip-chat-'+(currentUser||'guest').toLowerCase()},body:JSON.stringify({messages:[]})});
    const j=await r.json();
    if(!j.metadata)throw new Error(j.message||'fail');
    _chatBinId=j.metadata.id;
    localStorage.setItem(lk,_chatBinId);
  }catch(e){console.warn('Chat bin:',e.message);}
}
async function loadChatHistory(){
  try{
    await _ensureChatBin();
    if(!_chatBinId)throw new Error('no bin');
    const r=await fetch(`${_BINAPI}/${_chatBinId}/latest`,{headers:{'X-Access-Key':_APIKEY}});
    const j=await r.json();
    _chatMessages=(j.record||{}).messages||[];
  }catch(e){
    try{const l=localStorage.getItem('_chatLocal_'+(currentUser||'guest'));if(l)_chatMessages=JSON.parse(l);}catch(_){}
  }
  _renderChatHistory();
}
function _renderChatHistory(){
  const d=document.getElementById('chat-messages');
  if(!d)return;
  d.innerHTML='';
  if(!_chatMessages.length){
    _addBotMsg('Hey '+(currentUser||'there')+'! \uD83D\uDDFA\uFE0F Ask me anything about your India & Bangkok trip \u2014 flights, hotels, packing, what to do, or anything else!');
  }else{
    _chatMessages.forEach(m=>{m.role==='user'?_addUserMsg(m.content):_addBotMsg(m.content);});
  }
}
let _chatSaveTimer=null;
function _scheduleChatSave(){
  clearTimeout(_chatSaveTimer);
  _chatSaveTimer=setTimeout(async()=>{
    try{
      if(!_chatBinId)await _ensureChatBin();
      if(_chatBinId)await fetch(`${_BINAPI}/${_chatBinId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Access-Key':_APIKEY},body:JSON.stringify({messages:_chatMessages})});
    }catch(e){localStorage.setItem('_chatLocal_'+(currentUser||'guest'),JSON.stringify(_chatMessages));}
  },1000);
}
async function _ensureContextBin(){
  if(_contextBinId)return;
  try{
    const r=await fetch(_BINAPI,{method:'POST',headers:{'Content-Type':'application/json','X-Access-Key':_APIKEY,'X-Bin-Name':'trip-context-shared'},body:JSON.stringify({content:''})});
    const j=await r.json();
    if(!j.metadata)throw new Error(j.message||'fail');
    _contextBinId=j.metadata.id;
    localStorage.setItem('tripContextBinId',_contextBinId);
  }catch(e){console.warn('Context bin:',e.message);}
}
async function loadContext(){
  try{
    await _ensureContextBin();
    if(!_contextBinId)throw new Error('no bin');
    const r=await fetch(`${_BINAPI}/${_contextBinId}/latest`,{headers:{'X-Access-Key':_APIKEY}});
    const j=await r.json();
    sharedContext=(j.record||{}).content||'';
  }catch(e){
    try{const l=localStorage.getItem('_contextLocal');if(l)sharedContext=JSON.parse(l).content||'';}catch(_){}
  }
  const el=document.getElementById('ctx-input');
  if(el)el.value=sharedContext;
}
let _ctxSaveTimer=null;
function saveContext(){
  sharedContext=document.getElementById('ctx-input').value;
  const s=document.getElementById('ctx-status');
  if(s)s.textContent='Saving...';
  clearTimeout(_ctxSaveTimer);
  _ctxSaveTimer=setTimeout(async()=>{
    try{
      await _ensureContextBin();
      if(_contextBinId)await fetch(`${_BINAPI}/${_contextBinId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Access-Key':_APIKEY},body:JSON.stringify({content:sharedContext,updatedBy:currentUser,updatedAt:new Date().toISOString()})});
      if(s)s.textContent='Saved \u2713';
    }catch(e){
      localStorage.setItem('_contextLocal',JSON.stringify({content:sharedContext}));
      if(s)s.textContent='Saved locally';
    }
  },1200);
}
function showTab(tab){
  document.getElementById('view-chat').style.display=tab==='chat'?'flex':'none';
  document.getElementById('view-ctx').style.display=tab==='ctx'?'flex':'none';
  const ta=document.getElementById('tab-chat'),tb=document.getElementById('tab-ctx');
  ta.style.background=tab==='chat'?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.1)';
  ta.style.color=tab==='chat'?'#fff':'rgba(255,255,255,0.65)';
  tb.style.background=tab==='ctx'?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.1)';
  tb.style.color=tab==='ctx'?'#fff':'rgba(255,255,255,0.65)';
  if(tab==='ctx')loadContext();
}
function clearChat(){
  if(!confirm('Start a new chat? This will clear your current conversation history.'))return;
  _chatMessages=[];
  _renderChatHistory();
  _scheduleChatSave();
}
function toggleChat(){
  _chatOpen=!_chatOpen;
  const p=document.getElementById('chat-panel');
  p.style.display=_chatOpen?'flex':'none';
  if(_chatOpen){
    if(!_chatMessages.length)loadChatHistory();
    else _renderChatHistory();
    loadContext();
    setTimeout(()=>document.getElementById('chat-input').focus(),50);
  }
}
function _addMsg(html,align,bg,col){
  const d=document.getElementById('chat-messages');
  const b=document.createElement('div');
  b.style.cssText=`max-width:88%;padding:8px 11px;border-radius:11px;font-size:12px;line-height:1.55;background:${bg};color:${col};align-self:${align};white-space:pre-wrap;word-break:break-word;`;
  b.innerHTML=html;
  d.appendChild(b);
  d.scrollTop=d.scrollHeight;
  return b;
}
function _addUserMsg(t){_addMsg(t,'flex-end','#534AB7','#fff');}
function _addBotMsg(t){_addMsg(t,'flex-start','#f3f4f6','#111827');}
function _addTyping(){
  const d=document.getElementById('chat-messages');
  const b=document.createElement('div');
  b.id='chat-typing';
  b.style.cssText='padding:8px 11px;border-radius:11px;font-size:12px;background:#f3f4f6;color:#9ca3af;align-self:flex-start;';
  b.innerHTML='<span style="animation:none;">&#x2022;&#x2022;&#x2022;</span>';
  d.appendChild(b);
  d.scrollTop=d.scrollHeight;
  return b;
}
async function sendChat(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  _addUserMsg(text);
  _chatMessages.push({role:'user',content:text,time:new Date().toISOString()});
  if(!_OKEY||_OKEY.length<20){
    _addBotMsg('\u26A0\uFE0F LLM key not configured. Add LLM_KEY to GitHub secrets and redeploy.');
    _chatMessages.pop();
    return;
  }
  const typing=_addTyping();
  const fullPrompt=_SYSPROMPT+(sharedContext?'\n\nSHARED CONTEXT (maintained by Sha & Nikki):\n'+sharedContext:'');
  const apiMsgs=_chatMessages.slice(-20).map(m=>({role:m.role,content:m.content}));
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':_OKEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-3-5-haiku-20241022',system:fullPrompt,messages:apiMsgs,max_tokens:500})
    });
    const j=await r.json();
    typing.remove();
    if(j.error){_addBotMsg('\u274C '+j.error.message);_chatMessages.pop();return;}
    const reply=j.content[0].text;
    _chatMessages.push({role:'assistant',content:reply,time:new Date().toISOString()});
    _addBotMsg(reply);
    _scheduleChatSave();
  }catch(e){
    typing.remove();
    _addBotMsg('Could not connect. Check your internet connection.');
    _chatMessages.pop();
  }
}

// ── JSONBin cloud storage ──
const _APIKEY='__JSONBIN_KEY__';
const _BINAPI='https://api.jsonbin.io/v3/b';
let _binId=localStorage.getItem('tripBinId')||null;
let tripData={dayNotes:{},stickyNotes:[]};
async function _ensureBin(){
  if(_binId)return;
  const r=await fetch(_BINAPI,{method:'POST',headers:{'Content-Type':'application/json','X-Access-Key':_APIKEY,'X-Bin-Name':'sha-nikki-trip-2026'},body:JSON.stringify(tripData)});
  const j=await r.json();
  if(!j.metadata)throw new Error(j.message||'JSONBin create failed — check API key or CORS');
  _binId=j.metadata.id;
  localStorage.setItem('tripBinId',_binId);
}
async function loadData(){
  try{
    await _ensureBin();
    const r=await fetch(`${_BINAPI}/${_binId}/latest`,{headers:{'X-Access-Key':_APIKEY}});
    const j=await r.json();
    tripData=Object.assign({dayNotes:{},stickyNotes:[]},j.record||{});
  }catch(e){
    console.warn('Cloud load unavailable, using local data:',e.message);
    try{const l=localStorage.getItem('_tripLocal');if(l)tripData=JSON.parse(l);}catch(_){}
  }
  updateNoteIndicators();
  renderStickies();
}
let _saveTimer=null;
async function _saveData(){
  try{
    await _ensureBin();
    await fetch(`${_BINAPI}/${_binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Access-Key':_APIKEY},body:JSON.stringify(tripData)});
  }catch(e){
    console.warn('Cloud save unavailable, saving locally:',e.message);
    localStorage.setItem('_tripLocal',JSON.stringify(tripData));
  }
}
function updateNoteIndicators(){
  document.querySelectorAll('.ni').forEach(el=>el.remove());
  Object.entries(tripData.dayNotes||{}).forEach(([k,notes])=>{
    if(!notes||!notes.length)return;
    const cell=document.getElementById('day-'+k);
    if(!cell)return;
    const ind=document.createElement('div');
    ind.className='ni';
    ind.style.cssText='font-size:9px;color:#534AB7;margin-top:2px;font-weight:600;';
    ind.textContent='\uD83D\uDCAC '+notes.length;
    cell.appendChild(ind);
  });
}
function openDayModal(k,label){
  const notes=tripData.dayNotes[k]||[];
  document.getElementById('modal-overlay').style.display='flex';
  document.getElementById('modal-date').textContent=label;
  document.getElementById('modal-key').value=k;
  document.getElementById('modal-input').value='';
  document.getElementById('modal-add-btn').textContent='Add note as '+(currentUser||'guest');
  document.getElementById('modal-notes').innerHTML=notes.length?
    notes.map((n,i)=>`<div style="padding:7px 0;border-bottom:0.5px solid #e2e8f0;"><div style="display:flex;justify-content:space-between;align-items:center;"><span><span style="font-size:10px;font-weight:600;color:#534AB7;">${n.user}</span><span style="font-size:10px;color:#9ca3af;margin-left:6px;">${n.time}</span></span>${n.user===currentUser?`<button onclick="deleteNote('${k}',${i})" style="background:none;border:none;font-size:10px;color:#9ca3af;cursor:pointer;padding:0;">✕</button>`:''}</div><p style="font-size:12px;color:#111827;margin-top:3px;white-space:pre-wrap;">${n.text}</p></div>`).join(''):
    '<p style="font-size:12px;color:#9ca3af;padding:8px 0;">No notes yet — be the first!</p>';
}
function closeDayModal(){
  document.getElementById('modal-overlay').style.display='none';
}
function addDayNote(){
  const k=document.getElementById('modal-key').value;
  const text=document.getElementById('modal-input').value.trim();
  if(!text){document.getElementById('modal-input').focus();return;}
  if(!tripData.dayNotes[k])tripData.dayNotes[k]=[];
  const now=new Date();
  tripData.dayNotes[k].push({user:currentUser||'guest',text,time:now.toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})});
  updateNoteIndicators();
  openDayModal(k,document.getElementById('modal-date').textContent);
  _saveData();
}
function deleteNote(k,idx){
  if(!tripData.dayNotes[k])return;
  tripData.dayNotes[k].splice(idx,1);
  updateNoteIndicators();
  openDayModal(k,document.getElementById('modal-date').textContent);
  _saveData();
}
const _STICKY_COLORS=['#FFF9C4','#FFE4E1','#D1F5E0','#DBEAFE','#EDE9FE','#FFE4B5'];
function renderStickies(){
  const c=document.getElementById('stickies-container');
  if(!c)return;
  const notes=tripData.stickyNotes||[];
  if(!notes.length){
    c.innerHTML='<p style="font-size:12px;color:#9ca3af;padding:6px 0;">No sticky notes yet — click <b>+ Add</b> to create one.</p>';
    return;
  }
  c.innerHTML=notes.map((s,i)=>`<div style="background:${s.color};border-radius:10px;padding:10px 10px 8px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.08);"><button onclick="deleteSticky(${i})" title="Delete" style="position:absolute;top:6px;right:7px;background:none;border:none;font-size:13px;color:#aaa;cursor:pointer;line-height:1;">&#x2715;</button><textarea oninput="updateSticky(${i},this.value)" style="width:100%;background:transparent;border:none;outline:none;font-size:12px;font-family:inherit;resize:none;min-height:80px;color:#111827;line-height:1.65;padding-right:16px;" placeholder="Type here...">${s.text}</textarea></div>`).join('');
}
function addSticky(){
  if(!tripData.stickyNotes)tripData.stickyNotes=[];
  const color=_STICKY_COLORS[tripData.stickyNotes.length%_STICKY_COLORS.length];
  tripData.stickyNotes.push({text:'',color});
  renderStickies();
  const textareas=document.querySelectorAll('#stickies-container textarea');
  if(textareas.length)textareas[textareas.length-1].focus();
  _saveData();
}
function deleteSticky(idx){
  tripData.stickyNotes.splice(idx,1);
  renderStickies();
  _saveData();
}
let _stickyTimer=null;
function updateSticky(idx,val){
  if(!tripData.stickyNotes||!tripData.stickyNotes[idx])return;
  tripData.stickyNotes[idx].text=val;
  clearTimeout(_stickyTimer);
  _stickyTimer=setTimeout(_saveData,1200);
}
